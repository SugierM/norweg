services:
  postgres:
    image: postgres:16-alpine
    container_name: dictionary_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
    - ./app:/app/app
    - ./img:/app/img
    - ./norw_dictionaries:/app/norw_dictionaries
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ".env"


  frontend:
    build: ./norweg_UI
    ports:
      - "5173:5173"
    volumes:
      - ./norweg_UI:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data: